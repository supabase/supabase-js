name: Sync master → develop

# Backports any hotfix or patch merged to master back into develop.
# Runs on every push to master and hourly to catch any drift.

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 * * * *' # hourly

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "supabase-releaser[bot]"
          git config user.email "supabase-releaser[bot]@users.noreply.github.com"

      - name: Check if already in sync
        id: check
        run: |
          git fetch origin master develop
          if git merge-base --is-ancestor origin/master origin/develop; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge master into develop
        id: merge
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          git checkout develop
          git merge origin/master --no-edit || echo "conflict=true" >> $GITHUB_OUTPUT

      - name: Push
        if: ${{ steps.check.outputs.skip != 'true' && steps.merge.outputs.conflict != 'true' }}
        run: git push origin develop

      - name: Notify Slack on conflict
        if: ${{ steps.merge.outputs.conflict == 'true' }}
        uses: ./.github/workflows/slack-notify.yml
        with:
          title: 'master→develop sync conflict — manual resolution needed'
          status: 'failure'
