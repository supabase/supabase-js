name: Supabase JS tests
# Reusable workflow - called by ci.yml (PRs) and publish.yml (master)

on:
  workflow_call:

env:
  NODE_VERSION: '22'

jobs:
  build-package:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Configure Dependency Firewall registry
        shell: bash
        env:
          DF_FIREWALL_TOKEN: ${{ secrets.DF_FIREWALL_TOKEN }}
        run: |
          # The firewall token is withheld from fork-triggered PR runs, so only route
          # through the firewall when the token is present. Forks fall back to the
          # default public npm registry (install still uses --frozen-lockfile).
          if [ -n "$DF_FIREWALL_TOKEN" ]; then
            pnpm config set //firewall.depthfirst.com/npm/:_authToken "$DF_FIREWALL_TOKEN"
            pnpm config set registry https://firewall.depthfirst.com/npm/
          else
            echo "No DF_FIREWALL_TOKEN (likely a fork PR); using the default public npm registry."
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Build all packages
        run: pnpm nx run-many --target=build --all

      - name: Upload built packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-dist
          path: |
            packages/core/auth-js/dist
            packages/core/functions-js/dist
            packages/core/postgrest-js/dist
            packages/core/realtime-js/dist
            packages/core/storage-js/dist
            packages/core/supabase-js/dist

      - name: Upload UMD build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supabase-umd
          path: packages/core/supabase-js/dist/umd/supabase.js

  test:
    name: Unit + Type Check / Node.js ${{ matrix.node }} / OS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-package
    strategy:
      matrix:
        node: [22]
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Configure Dependency Firewall registry
        shell: bash
        env:
          DF_FIREWALL_TOKEN: ${{ secrets.DF_FIREWALL_TOKEN }}
        run: |
          # The firewall token is withheld from fork-triggered PR runs, so only route
          # through the firewall when the token is present. Forks fall back to the
          # default public npm registry (install still uses --frozen-lockfile).
          if [ -n "$DF_FIREWALL_TOKEN" ]; then
            pnpm config set //firewall.depthfirst.com/npm/:_authToken "$DF_FIREWALL_TOKEN"
            pnpm config set registry https://firewall.depthfirst.com/npm/
          else
            echo "No DF_FIREWALL_TOKEN (likely a fork PR); using the default public npm registry."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check + Unit Tests + Coverage
        run: pnpm nx run-many --targets=test:types,test:coverage --projects=supabase-js

      - name: Upload coverage results to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./packages/core/supabase-js/test/coverage/lcov.info
          parallel: true
          flag-name: supabase-js
          fail-on-error: false
        continue-on-error: true

  module-resolution:
    name: Module Resolution Tests
    runs-on: ubuntu-latest
    needs: build-package
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Configure Dependency Firewall registry
        shell: bash
        env:
          DF_FIREWALL_TOKEN: ${{ secrets.DF_FIREWALL_TOKEN }}
        run: |
          # The firewall token is withheld from fork-triggered PR runs, so only route
          # through the firewall when the token is present. Forks fall back to the
          # default public npm registry (install still uses --frozen-lockfile).
          if [ -n "$DF_FIREWALL_TOKEN" ]; then
            pnpm config set //firewall.depthfirst.com/npm/:_authToken "$DF_FIREWALL_TOKEN"
            pnpm config set registry https://firewall.depthfirst.com/npm/
          else
            echo "No DF_FIREWALL_TOKEN (likely a fork PR); using the default public npm registry."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-dist
          path: ./packages/core

      - name: Validate package exports (attw)
        run: pnpm nx test:exports supabase-js

      - name: Test ESM imports
        run: pnpm nx test:esm supabase-js

      - name: Test CJS requires
        run: pnpm nx test:cjs supabase-js

      - name: Test Hermes (React Native) compatibility
        run: pnpm nx test:hermes-compat supabase-js
