name: Patchback

# Cherry-picks a merged PR to master when a maintainer adds the 'patchback-master' label.
# Use this when a fix was merged to develop but needs to go to master urgently.
#
# Usage:
#   1. Add label 'patchback-master' to a merged PR
#   2. Bot cherry-picks the merge commit and opens a PR to master
#   3. Review and merge the PR, then run stable release workflow

on:
  pull_request:
    types: [labeled]

jobs:
  patchback-to-master:
    if: |
      github.event.label.name == 'patchback-master' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "supabase-releaser[bot]"
          git config user.email "supabase-releaser[bot]@users.noreply.github.com"

      - name: Cherry-pick to master
        id: cherry-pick
        run: |
          set -euo pipefail
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          BRANCH="patchback/master/${{ github.event.pull_request.number }}"

          git fetch origin master
          git checkout -b "$BRANCH" origin/master
          git cherry-pick -x "$MERGE_SHA" || {
            echo "conflict=true" >> $GITHUB_OUTPUT
            exit 0
          }
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open PR to master
        if: ${{ steps.cherry-pick.outputs.conflict != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base master \
            --head "${{ steps.cherry-pick.outputs.branch }}" \
            --title "chore: patchback #${{ github.event.pull_request.number }} to master" \
            --body "Patchback of #${{ github.event.pull_request.number }} to \`master\`."

      - name: Notify Slack on conflict
        if: ${{ steps.cherry-pick.outputs.conflict == 'true' }}
        uses: ./.github/workflows/slack-notify.yml
        with:
          title: 'Patchback conflict — manual cherry-pick needed for #${{ github.event.pull_request.number }}'
          status: 'failure'
