name: Patchback to master

# When a merged PR on develop is labeled "patchback-master", cherry-pick it to master.
# Opens a PR for review. On cherry-pick conflict, notifies Slack instead.

on:
  pull_request:
    types: [closed, labeled]
    branches: [develop]

permissions:
  contents: read

jobs:
  patchback:
    name: Cherry-pick to master
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'patchback-master')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout master
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Cherry-pick and open PR
        id: cherry-pick
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="patchback/${PR_NUMBER}"

          # Delete existing patchback branch if a previous run left one behind
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"

          # Fetch the merge commit from develop
          git fetch origin "$MERGE_SHA"

          if git cherry-pick "$MERGE_SHA" --no-edit; then
            git push origin "$BRANCH"

            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "${PR_TITLE}" \
              --body "$(cat <<EOF
          Cherry-pick of #${PR_NUMBER} to \`master\` for patch release.

          Original PR: #${PR_NUMBER}
          Original author: @${PR_AUTHOR}
          EOF
              )"

            # Request review from original author
            gh pr edit "$BRANCH" --add-reviewer "$PR_AUTHOR" || true

            echo "result=success" >> $GITHUB_OUTPUT
          else
            git cherry-pick --abort || true
            echo "result=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Notify on conflict
        if: steps.cherry-pick.outputs.result == 'conflict'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_CLIENT_LIBS_WEBHOOK }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS --fail-with-body -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<EOF
          {
            "channel": "#team-sdk",
            "username": "gha-failures-notifier",
            "icon_emoji": ":warning:",
            "attachments": [{
              "color": "danger",
              "title": "Patchback Cherry-pick Failed (supabase-js)",
              "text": "Could not cherry-pick <${PR_URL}|#${PR_NUMBER}> (${PR_TITLE}) to \`master\`.\n\nConflicts need manual resolution.\n<${RUN_URL}|View logs>",
              "footer": "patchback.yml"
            }]
          }
          EOF
              )"
          exit 1
