name: Integration Tests
# Reusable workflow for running integration tests with pkg.pr.new packages
# Called by preview-release.yml after packages are published

on:
  workflow_call:
    inputs:
      commit_hash:
        description: 'Git commit hash for pkg.pr.new URLs'
        required: true
        type: string

env:
  NODE_VERSION: '22'
  # Ensure Puppeteer installs and looks for Chrome in the same location
  PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

jobs:
  integration-tests:
    name: Integration Tests (All Platforms)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - name: Update pkg.pr.new URLs with commit hash
        run: ./scripts/update-pkg-pr-urls.sh "${INPUTS_COMMIT_HASH}"
        env:
          INPUTS_COMMIT_HASH: ${{ inputs.commit_hash }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Configure Dependency Firewall registry
        shell: bash
        env:
          DF_FIREWALL_TOKEN: ${{ secrets.DF_FIREWALL_TOKEN }}
        run: |
          # The firewall token is withheld from fork-triggered PR runs, so only route
          # through the firewall when the token is present. Forks fall back to the
          # default public npm registry (install still uses --frozen-lockfile).
          if [ -n "$DF_FIREWALL_TOKEN" ]; then
            pnpm config set //firewall.depthfirst.com/npm/:_authToken "$DF_FIREWALL_TOKEN"
            pnpm config set registry https://firewall.depthfirst.com/npm/
          else
            echo "No DF_FIREWALL_TOKEN (likely a fork PR); using the default public npm registry."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: '2.x'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache Supabase Docker images
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: docker-cache
        with:
          path: /tmp/supabase-docker-images
          key: supabase-docker-integration-${{ hashFiles('package.json', 'packages/core/supabase-js/test/supabase/**') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/supabase-docker-images/*.tar.zst; do
            [ -f "$f" ] && zstd -d --stdout "$f" | docker image load
          done

      - name: Cache Puppeteer browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: puppeteer-cache
        with:
          path: ${{ env.PUPPETEER_CACHE_DIR }}
          key: puppeteer-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install browser dependencies
        run: |
          # Ensure cache directory exists
          mkdir -p "$PUPPETEER_CACHE_DIR"
          # Install Puppeteer Chrome for integration.browser.test.ts
          # Only download if not already cached
          # puppeteer is a devDep of @supabase/supabase-js (isolated pnpm mode).
          if [ "${STEPS_PUPPETEER_CACHE_OUTPUTS_CACHE_HIT}" != "true" ]; then
            pnpm --filter @supabase/supabase-js exec puppeteer browsers install chrome
          fi
          # Install Playwright browsers for WebSocket tests.
          # @playwright/test is a devDep of the auth-js-example-react workspace package.
          if [ "${STEPS_PLAYWRIGHT_CACHE_OUTPUTS_CACHE_HIT}" != "true" ]; then
            pnpm --filter auth-js-example-react exec playwright install --with-deps
          else
            pnpm --filter auth-js-example-react exec playwright install-deps
          fi
        env:
          STEPS_PUPPETEER_CACHE_OUTPUTS_CACHE_HIT: ${{ steps.puppeteer-cache.outputs.cache-hit }}
          STEPS_PLAYWRIGHT_CACHE_OUTPUTS_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}

      - name: Setup Supabase
        run: pnpm nx test:supabase:setup supabase-js

      - name: Export auth keys
        run: |
          cd packages/core/supabase-js
          echo SUPABASE_PUBLISHABLE_KEY="$(pnpm exec supabase status --output json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "✅ Keys exported"

      - name: Verify edge functions
        run: |
          cd packages/core/supabase-js
          MAX_ATTEMPTS=10
          RETRY_DELAY=3
          HTTP_CODE=""
          RESPONSE=""

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS: Probing edge functions..."

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              -X POST \
              -H "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY" \
              -H "Content-Type: application/json" \
              -d '{"name":"CI"}' \
              http://127.0.0.1:54321/functions/v1/hello 2>/dev/null) || true

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Edge functions ready (attempt $attempt)"
              break
            fi

            echo "   Status: $HTTP_CODE (not ready yet)"

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "   Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Edge functions not responding after $MAX_ATTEMPTS attempts (final status: $HTTP_CODE)"
            echo "--- Edge functions log ---"
            cat /tmp/supabase-functions.log 2>/dev/null || echo "(no log available)"
            echo "--- End of log ---"
            exit 1
          fi

      - name: Prepare platform test dependencies
        run: |
          echo "📦 Installing dependencies for platform tests..."
          echo "   Using --no-frozen-lockfile because preview packages bump versions on each run"
          echo "   and the standalone sub-app lockfiles do not match the patched URLs."
          echo ""

          # --config.block-exotic-subdeps=false: these apps install supabase-js from
          # pkg.pr.new URL tarballs whose published manifest references siblings by URL.
          # The root workspace enables blockExoticSubdeps; we override via CLI here
          # because pnpm-workspace.yaml settings win over per-dir .npmrc even with
          # --ignore-workspace.
          cd packages/core/supabase-js/test/integration/next
          pnpm install --no-frozen-lockfile --ignore-scripts --ignore-workspace --config.block-exotic-subdeps=false
          pnpm exec playwright install --with-deps
          cd "$GITHUB_WORKSPACE"

          cd packages/core/supabase-js/test/integration/expo
          pnpm install --no-frozen-lockfile --ignore-scripts --ignore-workspace --config.block-exotic-subdeps=false
          cd "$GITHUB_WORKSPACE"

          cd packages/core/supabase-js/test/integration/bun
          bun install
          cd "$GITHUB_WORKSPACE"

      - name: Apply extra migrations for E2E tests
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 --single-transaction \
            -f packages/core/realtime-js/example/supabase/migrations/001_create_messages_table.sql

      - name: Run all tests in parallel
        run: |
          set -e

          # Core tests: Deno, Node integration, Browser integration
          # Using run-many coordinates builds properly (no race conditions)
          echo "🧪 Running core tests..."
          pnpm nx run-many \
            -t test:deno:all,test:integration,test:integration:browser \
            -p supabase-js \
            --parallel=3 \
            --verbose

          # Platform tests: Next.js, Expo, Bun
          echo "🧪 Running platform tests..."
          pnpm nx run-many \
            -t test:next,test:expo,test:bun \
            -p supabase-js \
            --parallel=3 \
            --verbose

          # WebSocket tests (requires completed platforms)
          echo "🧪 Running WebSocket tests..."
          pnpm nx test:node:playwright supabase-js

          echo "✅ All tests passed"

      - name: Run E2E tests
        run: |
          pnpm nx run-many \
            --target=test:e2e \
            --projects=auth-js,realtime-js \
            --parallel=1 \
            --verbose

      - name: Debug email infrastructure on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Mailpit status ==="
          curl -s http://127.0.0.1:54324/api/v1/info || echo "Mailpit not reachable on :54324"
          echo "=== All Mailpit messages ==="
          curl -s "http://127.0.0.1:54324/api/v1/messages" || echo "Could not list messages"
          echo "=== GoTrue container logs (last 50 lines) ==="
          docker logs $(docker ps -q --filter "name=supabase_auth") --tail=50 2>&1 || echo "Could not get GoTrue logs"
          echo "=== Mailpit container logs (last 20 lines) ==="
          docker logs $(docker ps -q --filter "name=supabase_mail") --tail=20 2>&1 || echo "Could not get Mailpit logs"

      - name: Debug e2e module resolution on failure
        if: failure()
        run: |
          echo "=== root node_modules/@supabase ==="
          ls -la node_modules/@supabase 2>&1 || true
          echo ""
          echo "=== realtime-js/example node_modules/@supabase ==="
          ls -la packages/core/realtime-js/example/node_modules/@supabase 2>&1 || true
          echo ""
          echo "=== auth-js/example/react node_modules/@supabase ==="
          ls -la packages/core/auth-js/example/react/node_modules/@supabase 2>&1 || true
          echo ""
          echo "=== supabase-js dist (entry points the workspace symlink resolves to) ==="
          ls packages/core/supabase-js/dist 2>&1 | head -20 || true
          echo ""
          echo "=== auth-js dist ==="
          ls packages/core/auth-js/dist 2>&1 | head -20 || true
          echo ""
          echo "=== Ports listening (3000 = realtime example, 5173 = auth example) ==="
          ss -tlnp 2>&1 | grep -E ":3000|:5173" || netstat -tlnp 2>&1 | grep -E ":3000|:5173" || true
          echo ""
          echo "=== Node / dev-server processes ==="
          ps -eo pid,etime,cmd | grep -E "next|vite|node " | grep -v grep | head -10 || true
          echo ""
          echo "=== pnpm version ==="
          pnpm --version
          echo ""
          echo "=== realtime-js example/package.json ==="
          cat packages/core/realtime-js/example/package.json | head -30

      - name: Upload Playwright reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/core/auth-js/example/react/playwright-report/
            packages/core/realtime-js/example/playwright-report/
          retention-days: 7

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true' && !cancelled()
        run: |
          mkdir -p /tmp/supabase-docker-images
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -v '<none>' \
            | grep -E 'supabase|postgrest|gotrue|storage-api|imgproxy|kong|inbucket|deno' \
            | while read img; do
                name=$(echo "$img" | tr '/:' '_')
                docker image save "$img" | zstd -T0 -3 -o "/tmp/supabase-docker-images/${name}.tar.zst"
              done

      - name: Stop Supabase
        if: always()
        run: pnpm nx test:supabase:stop supabase-js
