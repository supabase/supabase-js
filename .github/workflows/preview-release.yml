name: Preview release

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'packages/core/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'scripts/**'
      - '.github/workflows/preview-release.yml'
      - '.github/workflows/integration-tests.yml'
      - '!packages/core/**/*.md'
      - '!packages/core/**/docs/**'
      - '!packages/core/**/.prettierrc'
      - '!packages/core/**/*ignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.repository == 'supabase/supabase-js'
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.commit.outputs.sha }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Configure Dependency Firewall registry
        shell: bash
        env:
          DF_FIREWALL_TOKEN: ${{ secrets.DF_FIREWALL_TOKEN }}
        run: |
          # The firewall token is withheld from fork-triggered PR runs, so only route
          # through the firewall when the token is present. Forks fall back to the
          # default public npm registry (install still uses --frozen-lockfile).
          if [ -n "$DF_FIREWALL_TOKEN" ]; then
            pnpm config set //firewall.depthfirst.com/npm/:_authToken "$DF_FIREWALL_TOKEN"
            pnpm config set registry https://firewall.depthfirst.com/npm/
          else
            echo "No DF_FIREWALL_TOKEN (likely a fork PR); using the default public npm registry."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Nx SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Build all packages
        run: pnpm nx run-many --target=build --all

      - name: Publish preview packages
        run: |
          pnpm dlx pkg-pr-new@0.0.71 publish --compact \
            ./packages/core/auth-js \
            ./packages/core/functions-js \
            ./packages/core/postgrest-js \
            ./packages/core/realtime-js \
            ./packages/core/storage-js \
            ./packages/core/supabase-js \
            2>&1 | tee /tmp/pkg-pr-new-output.txt

      - name: Get commit hash
        id: commit
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Extract the SHA from pkg.pr.new URLs in the output
          # Lines look like: npm i https://pkg.pr.new/@supabase/supabase-js@49b3c56
          echo "--- pkg-pr-new captured output ---"
          cat /tmp/pkg-pr-new-output.txt
          echo "--- end of captured output ---"
          COMMIT_SHA=$(grep -oE 'pkg\.pr\.new/\S+@[a-f0-9]+' /tmp/pkg-pr-new-output.txt | head -1 | grep -oE '[a-f0-9]+$' || true)
          if [ -z "$COMMIT_SHA" ]; then
            echo "::warning::Failed to parse commit SHA from pkg-pr-new output, falling back to PR head SHA"
            COMMIT_SHA="$PR_HEAD_SHA"
          fi
          echo "sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "Commit SHA for pkg.pr.new URLs: $COMMIT_SHA"

  integration-tests:
    name: Run Integration Tests
    needs: preview
    uses: ./.github/workflows/integration-tests.yml
    with:
      commit_hash: ${{ needs.preview.outputs.commit_hash }}
    secrets: inherit
