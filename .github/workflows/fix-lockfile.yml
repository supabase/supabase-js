name: Fix Dependabot lockfile

on:
  pull_request:
    paths:
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # This is needed to match the npm version used when publishing
      - name: Update npm
        run: corepack enable npm && corepack prepare npm@11 --activate
      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit fixed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --staged --quiet || git commit -m "chore(deps): regenerate lockfile with latest npm"
          git push
